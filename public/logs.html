<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSentinel | Logs</title>
    <link rel="stylesheet" href="css/global.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script src="js/core/firebase-init.js" defer></script>
    <script src="js/features/logs.js" defer></script>

    <link rel="stylesheet" href="css/pages/logs.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dock.css">
    <script src="js/ui/dock.js" defer></script>

    <!-- Globe.gl (3D Earth) -->
    <script src="https://unpkg.com/globe.gl"></script>

    <script src="js/ui/visual-effects.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <!-- FLOATING NAVIGATION -->
        <!-- FLOATING DOCK NAVIGATION -->
        <nav class="dock-container">
            <a href="dashboard.html" class="dock-item">
                <div class="dock-icon-container">
                    <i class="bi bi-speedometer2 dock-icon"></i>
                </div>
                <div class="dock-tooltip">Monitor</div>
            </a>
            <a href="news.html" class="dock-item">
                <div class="dock-icon-container">
                    <i class="bi bi-newspaper dock-icon"></i>
                </div>
                <div class="dock-tooltip">News</div>
            </a>
            <a href="logs.html" class="dock-item active">
                <div class="dock-icon-container">
                    <i class="bi bi-file-earmark-text dock-icon"></i>
                </div>
                <div class="dock-tooltip">Logs</div>
            </a>
            <a href="archive.html" class="dock-item">
                <div class="dock-icon-container">
                    <i class="bi bi-archive dock-icon"></i>
                </div>
                <div class="dock-tooltip">Archives</div>
            </a>
            <a href="forums.html" class="dock-item">
                <div class="dock-icon-container">
                    <i class="bi bi-people dock-icon"></i>
                </div>
                <div class="dock-tooltip">Forums</div>
            </a>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="card-header reveal-on-scroll delay-0 margin-b-2">
                <a href="dashboard.html" class="header-brand-link">
                    <img src="./assets/images/logo.png" alt="BlueSentinel" class="brand-logo-img">
                    <h1 class="text-gradient brand-logo-text">BlueSentinel</h1>
                </a>
                <div class="text-center">
                    <h2 class="text-gradient header-subtitle">System Logs</h2>
                    <p class="text-muted">Historical alerts and maintenance records</p>
                </div>
            </header>

            <!-- Incident Map -->
            <div class="dash-card span-12 reveal-on-scroll delay-100 margin-b-1">
                <div class="card-header">
                    <span class="card-title"><i class="bi bi-geo-alt-fill margin-r-8"></i>Incident
                        Locations</span>
                    <div class="status-pill status-normal">Live</div>
                </div>
                <div id="logs-map" class="logs-map-container"></div>
            </div>

            <div class="dash-card span-12 reveal-on-scroll delay-200">
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Type</th>
                            <th>Details</th>
                            <th>Source</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        <!-- Content injected by logs.js -->
                        <tr>
                            <td colspan="4" class="text-center padding-2">Loading logs...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="./js/ui/theme-toggle.js"></script>
</body>

</html>
